apiVersion: v1
kind: Namespace
metadata:
  name: inference-platform-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-agent
  namespace: inference-platform-system
---
apiVersion: v1
kind: Secret
metadata:
  name: cluster-agent-auth
  namespace: inference-platform-system
type: Opaque
stringData:
  auth-token: "replace-with-management-plane-agent-token"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-agent-config
  namespace: inference-platform-system
data:
  management-url: "https://management.example.com"
  cluster-id: "replace-with-management-plane-cluster-id"
  capabilities: "dynamo=true,backend=vllm"
  executor-mode: "kubectl"
  poll-interval: "5s"
  heartbeat-interval: "30s"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inference-platform-cluster-agent
rules:
  - apiGroups: ["nvidia.com"]
    resources:
      - dynamographdeployments
      - dynamographdeploymentrequests
      - dynamocomponentdeployments
      - dynamomodels
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      - pods
      - services
      - events
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: inference-platform-cluster-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: inference-platform-cluster-agent
subjects:
  - kind: ServiceAccount
    name: cluster-agent
    namespace: inference-platform-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-agent
  namespace: inference-platform-system
  labels:
    app.kubernetes.io/name: cluster-agent
    app.kubernetes.io/part-of: inference-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-agent
        app.kubernetes.io/part-of: inference-platform
    spec:
      serviceAccountName: cluster-agent
      containers:
        - name: cluster-agent
          image: cr.yichang.puhui.chengfengerlai.com/aistudio/cluster-agent:dev
          imagePullPolicy: IfNotPresent
          args:
            - "-management-url=$(MANAGEMENT_URL)"
            - "-cluster-id=$(CLUSTER_ID)"
            - "-auth-token=$(AUTH_TOKEN)"
            - "-capability=$(CAPABILITIES)"
            - "-executor-mode=$(EXECUTOR_MODE)"
            - "-poll-interval=$(POLL_INTERVAL)"
            - "-heartbeat-interval=$(HEARTBEAT_INTERVAL)"
          env:
            - name: MANAGEMENT_URL
              valueFrom:
                configMapKeyRef:
                  name: cluster-agent-config
                  key: management-url
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: cluster-agent-config
                  key: cluster-id
            - name: CAPABILITIES
              valueFrom:
                configMapKeyRef:
                  name: cluster-agent-config
                  key: capabilities
            - name: EXECUTOR_MODE
              valueFrom:
                configMapKeyRef:
                  name: cluster-agent-config
                  key: executor-mode
            - name: POLL_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: cluster-agent-config
                  key: poll-interval
            - name: HEARTBEAT_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: cluster-agent-config
                  key: heartbeat-interval
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cluster-agent-auth
                  key: auth-token
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
