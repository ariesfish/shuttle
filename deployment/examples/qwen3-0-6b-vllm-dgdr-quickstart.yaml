apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeploymentRequest
metadata:
  name: qwen3-quickstart
  namespace: dynamo-system
spec:
  model: Qwen/Qwen3-0.6B
  backend: vllm
  image: cr.yichang.puhui.chengfengerlai.com/nvcr.io/nvidia/ai-dynamo/dynamo-planner:1.1.1
  autoApply: true
  hardware:
    gpuSku: h100_sxm
    totalGpus: 2
  overrides:
    dgd:
      apiVersion: nvidia.com/v1beta1
      kind: DynamoGraphDeployment
      spec:
        components:
          - name: Frontend
            podTemplate:
              spec:
                containers:
                  - image: cr.yichang.puhui.chengfengerlai.com/nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
                    env:
                      - name: HF_HOME
                        value: "/home/dynamo/.cache/huggingface"
                      - name: HF_ENDPOINT
                        value: https://hf-mirror.com
                    name: main
          - name: VllmDecodeWorker
            podTemplate:
              spec:
                containers:
                  - image: cr.yichang.puhui.chengfengerlai.com/nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
                    env:
                      - name: HF_HOME
                        value: "/home/dynamo/.cache/huggingface"
                      - name: HF_ENDPOINT
                        value: https://hf-mirror.com
                    name: main
    profilingJob:
      template:
        spec:
          containers:
            - name: profiler
              image: cr.yichang.puhui.chengfengerlai.com/nvcr.io/nvidia/ai-dynamo/dynamo-planner:1.1.1
              env:
                - name: HF_HOME
                  value: "/home/dynamo/.cache/huggingface"
                - name: HF_ENDPOINT
                  value: https://hf-mirror.com
  modelCache:
    pvcName: model-cache
    pvcMountPath: "/home/dynamo/.cache/huggingface"
    pvcModelPath: models--Qwen--Qwen3-0.6B/snapshots/c1899de289a04d12100db370d81485cdf75e47ca
