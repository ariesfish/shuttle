apiVersion: inference.zhiliu.dev/v1alpha1
kind: ServingRecipe
metadata:
  id: deepseek-v4-flash-vllm-dgd-disagg
  name: DeepSeek V4 Flash vLLM PD Disaggregated
spec:
  model:
    family: deepseek-v4
    variants: [flash]
    quantizations: [fp8]
  runtime:
    backend: vllm
    topology: pd-disagg
  support:
    status: experimental
    warning: Prefer SGLang disaggregated recipe for Ready smoke.
  template:
    path: deployment/examples/deepseek-v4-flash-vllm-dgd-disagg.yaml
    renderer: string-replacement-v1
  defaults:
    namespace: dynamo-system
    protocol: openai-compatible
    exposure: cluster-local
    optimizationTarget: throughput
    profilingMode: disabled
