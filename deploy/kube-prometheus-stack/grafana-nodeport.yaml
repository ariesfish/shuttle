apiVersion: v1
kind: Service
metadata:
  name: kube-prometheus-stack-grafana-nodeport
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/name: grafana
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/name: grafana
  ports:
    - name: http-web
      protocol: TCP
      port: 80
      targetPort: grafana
      nodePort: 31561
